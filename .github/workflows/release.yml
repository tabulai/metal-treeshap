name: Build and publish release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Build only, or publish through the TestPyPI trusted publisher
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - build-only

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wheel:
    name: Wheel / CPython ${{ matrix.python }}
    runs-on: ${{ vars.METAL_RUNNER || 'macos-15' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python }}
          architecture: arm64
          cache: pip
      - name: Require Apple Silicon and a usable Metal device
        run: |
          test "$(uname -m)" = arm64 || {
            echo "ERROR: release wheels require an arm64 macOS runner; got $(uname -m)." >&2
            exit 1
          }
          xcrun swift ci/check_metal.swift
      - name: Build wheel
        env:
          CMAKE_ARGS: -DMETAL_TREESHAP_BUILD_SHADERS=OFF
        run: |
          python -m pip install --upgrade pip build "numpy>=1.24" "pandas>=2" twine
          python -m build --wheel --outdir dist
          tag="cp$(printf '%s' '${{ matrix.python }}' | tr -d .)"
          python ci/verify_dist.py --require-wheel --expected-wheel-tag "$tag" dist/*
          python -m twine check dist/*
      - name: Install and exercise the built wheel on Metal
        run: |
          python -m pip install --force-reinstall dist/*.whl
          METAL_TREESHAP_SOURCE_DIR="$PWD" python tests/test_python_api.py
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-wheel-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Source distribution
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Build and inspect sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --outdir dist
          python -m twine check dist/*
          python ci/verify_dist.py --require-sdist dist/*
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  verify:
    name: Verify complete release set
    needs: [wheel, sdist]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Check metadata, archive contents, tags, and release tag
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
          python tests/test_python_package.py dist
          version="$(python ci/verify_dist.py \
            --require-sdist --require-wheel \
            --expected-wheel-tag cp310 \
            --expected-wheel-tag cp311 \
            --expected-wheel-tag cp312 \
            --expected-wheel-tag cp313 \
            --expected-wheel-tag cp314 \
            --print-version dist/* | tail -n 1)"
          if [ "$GITHUB_EVENT_NAME" = release ] && [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "ERROR: release tag '$GITHUB_REF_NAME' must equal package version tag 'v$version'." >&2
            exit 1
          fi
          sha256sum dist/* | tee SHA256SUMS
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-hashes
          path: SHA256SUMS
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: verify
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/metal-treeshap
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-distributions
          path: dist
      - name: Publish with the TestPyPI trusted publisher
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  smoke-testpypi:
    name: Install and test the TestPyPI wheel
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: publish-testpypi
    runs-on: ${{ vars.METAL_RUNNER || 'macos-15' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
          architecture: arm64
      - name: Require a usable Metal device
        run: xcrun swift ci/check_metal.swift
      - name: Install the immutable TestPyPI release
        run: |
          version="$(sed -n 's/^__version__ = "\([^"]*\)"/\1/p' \
            python/metal_treeshap/__init__.py)"
          test -n "$version"
          python -m pip install --upgrade pip "numpy>=1.24" "pandas>=2"
          for attempt in 1 2 3 4 5 6 7 8; do
            if python -m pip install --no-cache-dir --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "metal-treeshap==$version"; then
              break
            fi
            if [ "$attempt" = 8 ]; then
              echo "ERROR: TestPyPI did not serve metal-treeshap==$version after retries." >&2
              exit 1
            fi
            sleep 15
          done
      - name: Run the installed public API against Metal
        run: METAL_TREESHAP_SOURCE_DIR="$PWD" python tests/test_python_api.py

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: verify
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/metal-treeshap
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-distributions
          path: dist
      - name: Publish with the PyPI trusted publisher
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/

  smoke-pypi:
    name: Install and test the PyPI wheel
    if: github.event_name == 'release'
    needs: publish-pypi
    runs-on: ${{ vars.METAL_RUNNER || 'macos-15' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
          architecture: arm64
      - name: Require a usable Metal device
        run: xcrun swift ci/check_metal.swift
      - name: Install the immutable PyPI release
        run: |
          version="${GITHUB_REF_NAME#v}"
          python -m pip install "pandas>=2"
          for attempt in 1 2 3 4 5 6 7 8; do
            if python -m pip install --no-cache-dir "metal-treeshap==$version"; then
              break
            fi
            if [ "$attempt" = 8 ]; then
              echo "ERROR: PyPI did not serve metal-treeshap==$version after retries." >&2
              exit 1
            fi
            sleep 15
          done
      - name: Run the installed public API against Metal
        run: METAL_TREESHAP_SOURCE_DIR="$PWD" python tests/test_python_api.py
